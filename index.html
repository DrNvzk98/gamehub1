<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game UI Ninja V3 - Full Image Buttons</title>
    <style>
        /* ==========================================================================
           1. ATURAN DASAR & VIEWPORT GAME (ASPEK RASIO 16:9)
           ========================================================================== */
        *, *::before, *::after {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }
        
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #1a1a1a;
            font-family: 'Arial Rounded MT Bold', 'Segoe UI', sans-serif;
        }

        #game-viewport {
            position: absolute; top: 0; bottom: 0; left: 0; right: 0;
            width: 100vw; height: 56.25vw; max-height: 100vh; max-width: 177.78vh; 
            margin: auto; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            background: #7ec0ee;
        }

        /* ==========================================================================
           2. PENGATURAN GAMBAR LATAR BELAKANG & KARAKTER
           ========================================================================== */
        .layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover; background-position: center; background-repeat: no-repeat;
            will-change: transform;
        }
        #layer-sky { z-index: 1; background-image: linear-gradient(to bottom, #4ba3e3, #a1d6f7); }
        
        /* ISI LINK GAMBAR BACKGROUND DI SINI */
        #layer-clouds { z-index: 2; opacity: 0.85; animation: cloudFloat 60s linear infinite; background-image: url('asset/images/awan2.png'); }
        #layer-mountain { z-index: 3; y-index: -2; animation: cloudFloat 60s linear infinite;; background-image: url('asset/images/gunung.png'); }

        /* Karakter Ninja Bergerak Naik-Turun */
        .character-ninja {
            position: absolute; z-index: 30;
            animation: ninjaBob 2.5s ease-in-out infinite;
            display: flex; flex-direction: column; align-items: center;
        }
        .character-img {
            width: 100%; height: auto;
            content: url('asset/images/karakter.png'); /* ISI LINK GAMBAR NINJA */
        }

        /* ==========================================================================
           3. SISTEM TOMBOL GAMBAR & PENGATURAN POSISI (GAYA UTAMA)
           ========================================================================== */
        /* Semua komponen tombol menggunakan kelas dasar ini */
        .game-btn {
            position: absolute;
            z-index: 50;
            cursor: pointer;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            border: none;
            background-color: transparent;
            /* Efek Zoom In saat didekati kursor */
            transition: transform 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.25);
        }

        .game-btn:hover {
            transform: scale(1.1) !important; /* Membesar sedikit */
        }

        .game-btn:active {
            transform: scale(0.95) !important; /* Mengecil saat diklik */
        }

        /* Tampilan Adegan/Layar Game */
        .ui-scene {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10; display: none;
        }
        .ui-scene.active { display: block; }

        /* ==========================================================================
           4. STRUKTUR MENU DROPDOWN (GARIS TIGA)
           ========================================================================== */
        .hud-menu-container {
            position: absolute; top: 4%; right: 4%; z-index: 100;
            display: flex; flex-direction: column; align-items: flex-end; gap: 8px;
        }
        .dropdown-menu {
            display: flex; flex-direction: column; gap: 6px;
            max-height: 0; opacity: 0; overflow: hidden;
            transition: max-height 0.3s ease-out, opacity 0.2s ease;
            pointer-events: none;
        }
        .dropdown-menu.show { max-height: 400px; opacity: 1; pointer-events: auto; }

        /* ==========================================================================
           5. TEKS PERINTAH & SKOR (MURNI TEKS)
           ========================================================================== */
        .game-instruction-text {
            position: absolute; top: 5%; width: 100%; text-align: center;
            font-size: 2.5vw; font-weight: bold; color: #fff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8); z-index: 40; letter-spacing: 1px;
        }
        .canvas-tracing-container {
            position: absolute; left: 34%; top: 25%; width: 32%; height: 60%;
            background: rgba(255, 255, 255, 0.95); border-radius: 24px;
            border: 6px solid #333; display: flex; align-items: center; justify-content: center; z-index: 30;
        }
        .tracing-path-mockup { width: 80%; height: 80%; border: 6px dashed #aaa; border-radius: 50% 0 50% 50%; }

        /* Keyframes Animasi */
        @keyframes ninjaBob { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
        @keyframes cloudFloat { 0% { background-position-x: 0px; } 100% { background-position-x: 2000px; } }
    </style>
</head>
<body>

    <div id="game-viewport">
        <div id="layer-sky" class="layer"></div>
        <div id="layer-clouds" class="layer"></div>
        <div id="layer-mountain" class="layer"></div>

        <div class="hud-menu-container">
            <button class="game-btn" onclick="toggleDropdown()" 
                    style="position: static; width: 6vw; height: 6vw; background-image: url('LINK_TOMB_GARISTIGA.png');"></button>
            
            <div id="myDropdown" class="dropdown-menu" style="width: 15vw;">
                <button class="game-btn" onclick="triggerMenuAction('info')" style="position:static; width:100%; height:4vw; background-image:url('LINK_TOMB_INFO.png');"></button>
                <button class="game-btn" id="audio-toggle-btn" onclick="triggerMenuAction('musik')" style="position:static; width:100%; height:4vw; background-image:url('LINK_TOMB_MUSIK_ON.png');"></button>
                <button class="game-btn" onclick="triggerMenuAction('home')" style="position:static; width:100%; height:4vw; background-image:url('LINK_TOMB_HOME.png');"></button>
            </div>
        </div>

        <div id="scene-start" class="ui-scene active">
            <button class="game-btn" onclick="switchScene('scene-menu')" 
                    style="width: 22%; height: 12%; left: 39%; bottom: 25%; background-image: url('LINK_GAMBAR_TOMBO_START.png');"></button>
            
            <div class="character-ninja" style="width: 16%; right: 12%; bottom: 12%;">
                <img class="character-img" alt="Ninja">
            </div>
        </div>

        <div id="scene-menu" class="ui-scene">
            <button class="game-btn" onclick="switchScene('scene-levels')" 
                    style="width: 32%; height: 10%; left: 34%; top: 30%; background-image: url('LINK_TOMBO_KAYU_1.png');"></button>
            <button class="game-btn" 
                    style="width: 32%; height: 10%; left: 34%; top: 45%; background-image: url('LINK_TOMBO_KAYU_2.png');"></button>
            <button class="game-btn" 
                    style="width: 32%; height: 10%; left: 34%; top: 60%; background-image: url('LINK_TOMBO_KAYU_3.png');"></button>
            
            <div class="character-ninja" style="width: 16%; left: 10%; bottom: 12%;">
                <img class="character-img" alt="Ninja">
            </div>
        </div>

        <div id="scene-levels" class="ui-scene">
            <div style="position: absolute; width: 40%; height: 12%; left: 30%; top: 8%; background: url('LINK_BANNER_LEVEL.png') no-repeat center; background-size: contain;"></div>
            
            <button class="game-btn" onclick="switchScene('scene-gameplay')" style="width: 7%; height: 12%; left: 32%; top: 35%; background-image: url('LINK_ANGKA_1.png');"></button>
            <button class="game-btn" style="width: 7%; height: 12%; left: 42%; top: 35%; background-image: url('LINK_ANGKA_2.png');"></button>
            <button class="game-btn" style="width: 7%; height: 12%; left: 52%; top: 35%; background-image: url('LINK_ANGKA_3.png');"></button>
            <button class="game-btn" style="width: 7%; height: 12%; left: 62%; top: 35%; background-image: url('LINK_ANGKA_4.png');"></button>

            <div class="character-ninja" style="width: 14%; left: 8%; bottom: 12%;">
                <img class="character-img" alt="Ninja">
            </div>
        </div>

        <div id="scene-gameplay" class="ui-scene">
            <div class="game-instruction-text">TEBALKAN HURUF DI BAWAH SESUAI GARIS</div>
            
            <div class="canvas-tracing-container">
                <div class="tracing-path-mockup"></div>
            </div>

            <div class="character-ninja" style="width: 16%; right: 10%; bottom: 12%;">
                <img class="character-img" alt="Ninja">
            </div>
        </div>
    </div>

    <script>
        const viewport = document.getElementById('game-viewport');
        const mountain = document.getElementById('layer-mountain');
        const clouds = document.getElementById('layer-clouds');
        const dropdown = document.getElementById('myDropdown');
        let isMusicOn = true;

        // Parallax Kamera Efek Bergerak
        viewport.addEventListener('mousemove', (e) => {
            const rect = viewport.getBoundingClientRect();
            const x = e.clientX - rect.left - (rect.width / 2);
            const y = e.clientY - rect.top - (rect.height / 2);
            mountain.style.transform = `translate(${x * 0.02}px, ${y * 0.01}px) scale(1.05)`;
            clouds.style.transform = `translate(${x * 0.005}px, 0px)`;
        });

        function toggleDropdown() { dropdown.classList.toggle('show'); }

        window.onclick = function(event) {
            if (!event.target.matches('.game-btn')) {
                if (dropdown.classList.contains('show')) dropdown.classList.remove('show');
            }
        }

        function triggerMenuAction(actionType) {
            dropdown.classList.remove('show');
            if (actionType === 'info') {
                alert("Game Edukasi Menulis - Versi Gambar UI Penuh!");
            } else if (actionType === 'musik') {
                isMusicOn = !isMusicOn;
                const musicBtn = document.getElementById('audio-toggle-btn');
                if (isMusicOn) {
                    musicBtn.style.backgroundImage = "url('LINK_TOMB_MUSIK_ON.png')";
                    alert("Musik dinyalakan");
                } else {
                    musicBtn.style.backgroundImage = "url('LINK_TOMB_MUSIK_OFF.png')";
                    alert("Musik dimatikan");
                }
            } else if (actionType === 'home') {
                switchScene('scene-start');
            }
        }

        function switchScene(sceneId) {
            const scenes = document.querySelectorAll('.ui-scene');
            scenes.forEach(scene => scene.classList.remove('active'));
            const targetScene = document.getElementById(sceneId);
            if (targetScene) targetScene.classList.add('active');
        }
    </script>
</body>
</html>
