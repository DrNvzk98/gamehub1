<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ninja Arcade - Arabic Education Game</title>
    <style>
        /* ==========================================================================
           [NOTE 1] PENGATURAN FONT GLOBAL & UTAN ASPEK RATIO (16:9)
           ========================================================================== */
        @font-face {
            font-family: 'Lazydog';
            src: url('isi link (font lazydog) disini') format('truetype'); 
            font-weight: normal;
            font-style: normal;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            margin: 0;
            padding: 0;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #1a1a1a;
            font-family: 'Lazydog', sans-serif;
        }

        #game-viewport {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100vw;
            height: 56.25vw; 
            max-height: 100vh;
            max-width: 177.78vh;
            background-color: #7ec0ee;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* ==========================================================================
           [NOTE 2] PARALLAX EFFECT (1 Gunung Berjalan Lambat & 3 Lapisan Awan)
           ========================================================================== */
        .parallax-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            pointer-events: none;
        }

        .mountain-layer {
            background-repeat: repeat-x;
            animation: moveParallaxHorizontal 150s linear infinite;
        }

        .cloud-1 { background-repeat: repeat-x; animation: moveParallaxHorizontal 30s linear infinite; }
        .cloud-2 { background-repeat: repeat-x; animation: moveParallaxHorizontal 45s linear infinite; animation-delay: -10s; }
        .cloud-3 { background-repeat: repeat-x; animation: moveParallaxHorizontal 60s linear infinite; animation-delay: -25s; }

        @keyframes moveParallaxHorizontal {
            0% { background-position-x: 0px; }
            100% { background-position-x: -1920px; }
        }

        /* ==========================================================================
           [NOTE 3] ANIMASI INTERAKTIF & FLOATING NINJA
           ========================================================================== */
        .ninja-floating {
            animation: ninjaFloat 3s ease-in-out infinite;
        }
        @keyframes ninjaFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .zoom-in-title {
            animation: titleZoom 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes titleZoom {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .btn-interactive {
            cursor: pointer;
            transition: transform 0.2s ease;
        }
        .btn-interactive:hover {
            transform: scale(1.08);
        }
        .btn-interactive:active {
            transform: scale(0.95);
        }

        .lazydog-text {
            font-family: 'Lazydog', sans-serif;
            color: #bd6a2c; 
            -webkit-text-stroke: 2px white; 
            text-shadow: 2px 2px 0px rgba(0,0,0,0.1);
            text-align: center;
        }

        .game-screen {
            display: none;
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
        }
        .game-screen.active {
            display: block;
        }

        /* Navigasi Dropdown Atas (Hanya Kumpulan Button Gambar Tanpa Kotak Luar) */
        #global-nav {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 100;
        }
        .dropdown-menu {
            display: none;
            position: absolute;
            top: 70px;
            right: 0;
            background: transparent; /* Kotak luar dihilangkan */
            border: none;
            padding: 0;
            min-width: 150px;
        }
        .dropdown-menu-box {
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
        }

        #info-popup {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 200;
        }

        .letter-bank-container {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 85%;
            height: 100px;
            background: url('isi link (papan kayu panjang bank huruf) disini') no-repeat center;
            background-size: 100% 100%;
            overflow-x: auto;
            white-space: nowrap;
            padding: 15px 30px;
        }
        .bank-item {
            display: inline-block;
            width: 60px;
            height: 60px;
            margin-right: 15px;
        }

        #writing-canvas {
            background: transparent;
            cursor: crosshair;
        }
    </style>
</head>
<body>

<div id="game-viewport">

    <div class="parallax-layer mountain-layer" style="background-image: url('1.jpg');"></div>
    <div class="parallax-layer cloud-1" style="background-image: url('isi link (gambar awan 1) disini'); opacity: 0.5;"></div>
    <div class="parallax-layer cloud-2" style="background-image: url('isi link (gambar awan 2) disini'); opacity: 0.3;"></div>
    <div class="parallax-layer cloud-3" style="background-image: url('isi link (gambar awan 3) disini'); opacity: 0.4;"></div>
    
    <audio id="bgm" loop>
        <source src="isi link (audio musik latar belakang) disini" type="audio/mpeg">
    </audio>

    <div id="global-nav" style="display: none;">
        <img id="btn-burger" class="btn-interactive" src="asset/tombol/ttitik3.png" width="60" height="60" onclick="toggleDropdown()">
        <img id="btn-close-menu" class="btn-interactive" src="asset/tombol/tclose.png" width="60" height="60" style="display:none; position: absolute; top:0; left:0;" onclick="closeAllMenus()">
        
        <div id="dropdown-box" class="dropdown-menu">
            <div class="dropdown-menu-box">
                <img class="btn-interactive" src="isi link (gambar/tombol tulisan HOME) disini" width="130" height="42" onclick="goToScreen('screen-start')">
                <img id="btn-toggle-music" class="btn-interactive" src="isi link (gambar/tombol tulisan MUSIC ON) disini" width="130" height="42" onclick="toggleMusic()">
                <img class="btn-interactive" src="isi link (gambar/tombol tulisan INFO) disini" width="130" height="42" onclick="showInfoPopup()">
            </div>
        </div>
    </div>

    <div id="info-popup">
        <div style="position: absolute; top:50%; left:50%; transform: translate(-50%, -50%); width:600px; height:400px; background: url('2.jpg') no-repeat center; background-size:100% 100%;">
            <div class="lazydog-text" style="font-size: 26px; color: #fff; margin-top: 110px; padding: 0 50px;">
                NINJA ARCADE INFO<br><br>
                Game ini dibuat untuk latihan mengenal, membedakan, dan menulis huruf Hijaiyyah secara interaktif!
            </div>
        </div>
    </div>


    <div id="screen-start" class="game-screen active">
        <div class="zoom-in-title" style="position: absolute; top: 10%; left: 20%; width: 60%; text-align: center;">
            <img src="isi link (gambar judul utama NINJA ARCADE dari Canva) disini" style="max-width: 100%; height: auto;">
        </div>
        
        <img class="btn-interactive" src="asset/tombol/Start.png" width="220" height="110" style="position: absolute; top: 58%; left: 25%;" onclick="startPlay()">
        <img class="ninja-floating" src="asset/images/karakter.png" width="280" height="280" style="position: absolute; top: 40%; right: 15%;">
    </div>


    <div id="screen-mode-selection" class="game-screen" style="background: url('3.jpg') no-repeat center; background-size: cover;">
        <div style="position: absolute; top: 5%; left: 5%; width: 18%;">
            <img src="isi link (gambar logo/judul kecil Ninja Arcade) disini" style="width: 100%;">
        </div>
        
        <div style="position: absolute; top: 15%; left: 45%; display: flex; flex-direction: column; gap: 20px;">
            <img class="btn-interactive" src="asset/tombol/tbelajar.png" width="320" height="90" onclick="goToScreen('screen-belajar-mengenal')">
            <img class="btn-interactive" src="asset/tombol/tbermain.png" width="320" height="90" onclick="goToScreen('screen-bermain-level')">
            <img class="btn-interactive" src="asset/tombol/tlatihan.png" width="320" height="90" onclick="goToScreen('screen-latihan-list')">
        </div>

        <img class="ninja-floating" src="asset/images/karakter.png" width="250" height="250" style="position: absolute; bottom: 10%; left: 15%;">
    </div>


    <div id="screen-belajar-mengenal" class="game-screen" style="background: url('tampilan mengenal.png') no-repeat center; background-size: cover;">
        <div style="position: absolute; top: 18%; left: 38%; width: 55%;">
            <img src="isi link (gambar judul tulisan AYO MENGENAL HURUF HIJAIYYAH) disini" style="width: 100%;">
        </div>
        <img class="btn-interactive" src="asset/tombol/startkayu.png" width="200" height="100" style="position: absolute; bottom: 20%; left: 55%;" onclick="goToScreen('screen-belajar-kategori')">
        <img class="ninja-floating" src="asset/images/karakter.png" width="250" height="250" style="position: absolute; bottom: 10%; left: 10%;">
    </div>


    <div id="screen-belajar-kategori" class="game-screen" style="background: url('tampilan belajar.png') no-repeat center; background-size: cover;">
        <div style="position: absolute; top: 15%; left: 45%; display: flex; flex-direction: column; gap: 15px;">
            <img class="btn-interactive" src="asset/tombol/hurufasli.png" width="320" height="85" onclick="initMenuBelajar('asli')">
            <img class="btn-interactive" src="asset/tombol/hurufberharakat.png" width="320" height="85" onclick="initMenuBelajar('harakat')">
            <img class="btn-interactive" src="asset/tombol/menulis.png" width="320" height="85" onclick="initMenuBelajar('menulis')">
        </div>
        <img class="ninja-floating" src="asset/images/karakter.png" width="250" height="250" style="position: absolute; bottom: 10%; left: 10%;">
    </div>


    <div id="screen-belajar-core" class="game-screen">
        <div style="position: absolute; top: 6%; left: 32%; width: 45%; text-align: center;">
            <img id="img-instruction-header" src="" style="max-width: 100%; height: auto;">
        </div>

        <div id="belajar-content-area" style="position: absolute; top: 25%; left: 40%; width: 40%; height: 40%; display: flex; justify-content: center; align-items: center; gap: 30px;"></div>

        <img class="btn-interactive" src="isi link (tombol panah batu kiri) disini" width="70" height="70" style="position: absolute; top: 45%; left: 33%;" onclick="navigateLetter(-1)">
        <img class="btn-interactive" src="isi link (tombol panah batu kanan) disini" width="70" height="70" style="position: absolute; top: 45%; right: 23%;" onclick="navigateLetter(1)">

        <div class="letter-bank-container" id="bank-huruf-list"></div>

        <img class="ninja-floating" src="asset/images/karakter.png" width="250" height="250" style="position: absolute; bottom: 15%; left: 8%;">
    </div>


    <div id="screen-bermain-level" class="game-screen" style="background: url('10.jpg') no-repeat center; background-size: cover;">
        <div style="position: absolute; top: 6%; left: 30%; width: 40%; text-align: center;">
            <img src="isi link (gambar tulisan PILIH LEVEL PERMAINAN) disini" style="max-width: 100%;">
        </div>
        
        <div style="position: absolute; top: 42%; left: 50%; transform: translateX(-50%); display: flex; gap: 40px;">
            <div style="text-align: center;">
                <img id="lvl-btn-1" class="btn-interactive" src="isi link (tombol lingkaran level warna kuning) disini" width="90" height="90" onclick="startQuizLevel(1)">
                <div class="lazydog-text" style="color:#fff; font-size:18px; margin-top:5px;">LEVEL 1</div>
            </div>
            <div style="text-align: center;">
                <img id="lvl-btn-2" class="btn-interactive" src="isi link (tombol lingkaran level warna cokelat) disini" width="90" height="90" onclick="startQuizLevel(2)" style="filter: grayscale(0.3); pointer-events: none;">
                <div class="lazydog-text" style="color:#fff; font-size:18px; margin-top:5px;">LEVEL 2</div>
            </div>
        </div>
    </div>


    <div id="screen-quiz-gameplay" class="game-screen" style="background: url('18.png') no-repeat center; background-size: cover;">
        <div class="lazydog-text" id="quiz-score-display" style="position: absolute; top: 25px; left: 45px; font-size: 32px; color: #fff;">SKOR : 0</div>
        
        <div style="position: absolute; top: 12%; left: 30%; width: 40%; text-align: center;">
            <img id="img-quiz-question-title" src="" style="max-width: 100%;">
        </div>

        <div style="position: absolute; top: 30%; left: 45%; width: 15%; height: 30%; display:flex; justify-content:center; align-items:center;">
            <img id="quiz-center-image" src="" style="max-width:100%; max-height:100%;">
        </div>

        <div id="quiz-answers-box" style="position: absolute; bottom: 15%; left: 50%; transform: translateX(-50%); display: flex; gap: 30px;"></div>
    </div>


    <div id="screen-latihan-list" class="game-screen" style="background: url('11.jpg') no-repeat center; background-size: cover;">
        <div class="lazydog-text" id="latihan-score-display" style="position: absolute; top: 25px; left: 45px; font-size: 32px; color: #fff;">SKOR : 0</div>
        
        <div style="position: absolute; top: 8%; left: 30%; width: 40%; text-align: center;">
            <img src="isi link (gambar teks COBALAH MENULIS MANDIRI) disini" style="max-width: 100%;">
        </div>

        <div id="canvas-bg-box" style="position: absolute; top: 22%; left: 40%; width: 300px; height: 300px; background: url('isi link (gambar awal outline huruf alif kosong) disini') no-repeat center; background-size: contain; border: 4px dashed white; border-radius: 20px;">
            <canvas id="writing-canvas" width="300" height="300"></canvas>
        </div>

        <div id="reward-overlay" style="display:none; position: absolute; top:25%; left:42%; width:260px; background: rgba(255,255,255,0.9); border-radius:20px; padding:20px; text-align:center; box-shadow: 0 5px 15px rgba(0,0,0,0.3);">
            <img src="isi link (gambar lencana reward sempurna) disini" width="100">
            <div class="lazydog-text" style="font-size:24px; color: green; margin-top:20px;">SEMPURNA!</div>
        </div>

        <div style="position: absolute; bottom: 15%; left: 41%; display:flex; gap:20px;">
            <img class="btn-interactive" src="isi link (tombol gambar tulisan HAPUS) disini" width="130" height="52" onclick="clearCanvas()">
            <img class="btn-interactive" src="isi link (tombol gambar tulisan CEK HASIL) disini" width="145" height="52" onclick="checkWritingSuccess()">
        </div>

        <img class="ninja-floating" src="asset/images/karakter.png" width="220" height="220" style="position: absolute; bottom: 10%; left: 8%;">
    </div>

</div>

<script>
    const letterData = [
        { 
            id: 0, 
            name: 'ALIF', 
            imgAsli: 'isi link (gambar alif asli) disini', 
            imgA: 'isi link (gambar alif fathah) disini', 
            imgI: 'isi link (gambar alif kasrah) disini', 
            imgU: 'isi link (gambar alif dhammah) disini', 
            audio: 'isi link (audio suara alif) disini', 
            audioA: 'isi link (audio suara a) disini', 
            audioI: 'isi link (audio suara i) disini', 
            audioU: 'isi link (audio suara u) disini', 
            outline: 'isi link (gambar alif outline putih) disini', 
            fullColor: 'isi link (gambar alif penuh warna sukses) disini' 
        },
        { 
            id: 1, 
            name: 'BA', 
            imgAsli: 'isi link (gambar ba asli) disini', 
            imgA: 'isi link (gambar ba fathah) disini', 
            imgI: 'isi link (gambar ba kasrah) disini', 
            imgU: 'isi link (gambar ba dhammah) disini', 
            audio: 'isi link (audio suara ba) disini', 
            audioA: 'isi link (audio suara ba fathah) disini', 
            audioI: 'isi link (audio suara ba kasrah) disini', 
            audioU: 'isi link (audio suara ba dhammah) disini', 
            outline: 'isi link (gambar ba outline putih) disini', 
            fullColor: 'isi link (gambar ba penuh warna sukses) disini' 
        }
    ];

    let currentLetterIndex = 0;
    let currentBelajarMode = 'asli'; 
    let globalScore = 0;
    let musicPlaying = false;
    let level2Unlocked = false;
    let quizCurrentQuestion = 0;

    const imgMusicOnLink = "isi link (gambar/tombol tulisan MUSIC ON) disini";
    const imgMusicOffLink = "isi link (gambar/tombol tulisan MUSIC OFF) disini";

    function goToScreen(screenId) {
        document.querySelectorAll('.game-screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
        
        if (screenId === 'screen-start') {
            document.getElementById('global-nav').style.display = 'none';
        } else {
            document.getElementById('global-nav').style.display = 'block';
        }
        closeAllMenus();
    }

    function startPlay() {
        if(!musicPlaying) { toggleMusic(); }
        goToScreen('screen-mode-selection');
    }

    function toggleDropdown() {
        const dd = document.getElementById('dropdown-box');
        const burger = document.getElementById('btn-burger');
        const closeBtn = document.getElementById('btn-close-menu');
        
        if (dd.style.display === 'block') {
            closeAllMenus();
        } else {
            dd.style.display = 'block';
            burger.style.display = 'none';
            closeBtn.style.display = 'block';
        }
    }

    function closeAllMenus() {
        document.getElementById('dropdown-box').style.display = 'none';
        document.getElementById('info-popup').style.display = 'none';
        document.getElementById('btn-close-menu').style.display = 'none';
        document.getElementById('btn-burger').style.display = 'block';
    }

    // Mengatur Background Khusus Pada Menu Belajar Huruf Sesuai Gambar Asetnya
    function initMenuBelajar(mode) {
        currentBelajarMode = mode;
        currentLetterIndex = 0;
        
        const coreScreen = document.getElementById('screen-belajar-core');
        if (mode === 'asli') {
            coreScreen.style.background = "url('Menu belajar huruf.png') no-repeat center";
        } else if (mode === 'harakat') {
            coreScreen.style.background = "url('Menu  huruf berharakat.png') no-repeat center";
        } else if (mode === 'menulis') {
            coreScreen.style.background = "url('Menu awal cara menulis.png') no-repeat center";
        }
        coreScreen.style.backgroundSize = "cover";

        goToScreen('screen-belajar-core');
        renderLetterContent();
        renderLetterBank();
    }

    function showInfoPopup() { document.getElementById('info-popup').style.display = 'block'; }

    function toggleMusic() {
        const audio = document.getElementById('bgm');
        const btnImg = document.getElementById('btn-toggle-music');
        if (musicPlaying) {
            audio.pause();
            btnImg.src = imgMusicOffLink;
            musicPlaying = false;
        } else {
            audio.play().catch(e => console.log("Audio play blocked"));
            btnImg.src = imgMusicOnLink;
            musicPlaying = true;
        }
    }

    function renderLetterContent() {
        const area = document.getElementById('belajar-content-area');
        const headerImg = document.getElementById('img-instruction-header');
        const item = letterData[currentLetterIndex];
        area.innerHTML = '';

        if (currentBelajarMode === 'asli') {
            headerImg.src = "isi link (gambar teks panduan klik huruf untuk suara) disini";
            area.innerHTML = `
                <div style="text-align:center;">
                    <img class="btn-interactive" src="${item.imgAsli}" width="150" onclick="playAudio('${item.audio}')"><br>
                    <div class="lazydog-text" style="font-size:32px; color:#fff; margin-top:10px;">${item.name}</div>
                </div>
            `;
        } else if (currentBelajarMode === 'harakat') {
            headerImg.src = "isi link (gambar teks panduan klik huruf untuk suara harakat) disini";
            area.innerHTML = `
                <div class="btn-interactive" style="text-align:center;" onclick="playAudio('${item.audioU}')">
                    <img src="${item.imgU}" width="90"><div class="lazydog-text" style="font-size:24px; color:#fff;">U</div>
                </div>
                <div class="btn-interactive" style="text-align:center;" onclick="playAudio('${item.audioI}')">
                    <img src="${item.imgI}" width="90"><div class="lazydog-text" style="font-size:24px; color:#fff;">I</div>
                </div>
                <div class="btn-interactive" style="text-align:center;" onclick="playAudio('${item.audioA}')">
                    <img src="${item.imgA}" width="90"><div class="lazydog-text" style="font-size:24px; color:#fff;">A</div>
                </div>
            `;
        } else if (currentBelajarMode === 'menulis') {
            headerImg.src = "isi link (gambar teks panduan tekan huruf melihat cara penulisan) disini";
            area.innerHTML = `
                <div style="text-align:center;">
                    <img id="animated-writing-img" class="btn-interactive" src="${item.outline}" width="160" onclick="triggerWritingAnimation()">
                    <div class="lazydog-text" style="font-size:28px; color:#fff; margin-top:10px;">${item.name}</div>
                </div>
            `;
        }
    }

    function triggerWritingAnimation() {
        const img = document.getElementById('animated-writing-img');
        const item = letterData[currentLetterIndex];
        img.src = item.fullColor;
        setTimeout(() => { img.src = item.outline; }, 2500);
    }

    function renderLetterBank() {
        const bank = document.getElementById('bank-huruf-list');
        bank.innerHTML = '';
        letterData.forEach((item, index) => {
            const node = document.createElement('img');
            node.className = 'bank-item btn-interactive';
            node.src = item.imgAsli;
            node.onclick = () => { currentLetterIndex = index; renderLetterContent(); };
            bank.appendChild(node);
        });
    }

    function navigateLetter(dir) {
        currentLetterIndex += dir;
        if (currentLetterIndex < 0) currentLetterIndex = letterData.length - 1;
        if (currentLetterIndex >= letterData.length) currentLetterIndex = 0;
        renderLetterContent();
    }

    function playAudio(src) { const sound = new Audio(src); sound.play().catch(e => {}); }

    let activeLevel = 1;
    function startQuizLevel(lvl) {
        activeLevel = lvl;
        quizCurrentQuestion = 0;
        goToScreen('screen-quiz-gameplay');
        generateQuizQuestion();
    }

    function generateQuizQuestion() {
        const centerImg = document.getElementById('quiz-center-image');
        const headerImg = document.getElementById('img-quiz-question-title');
        const ansBox = document.getElementById('quiz-answers-box');
        ansBox.innerHTML = '';
        const currentItem = letterData[quizCurrentQuestion % letterData.length];

        if (activeLevel === 1) {
            headerImg.src = "isi link (gambar teks pertanyaan HURUF APAKAH INI) disini";
            centerImg.src = currentItem.imgAsli;
            const options = [currentItem.name, 'TSA']; 
            options.sort(() => Math.random() - 0.5);
            options.forEach(opt => {
                ansBox.innerHTML += `<button class="btn-interactive lazydog-text" style="padding:15px 30px; font-size:24px; background:rgba(139,69,19,0.9); border:4px solid white; border-radius:10px; color:#fff;" onclick="checkQuizAnswer('${opt}', '${currentItem.name}')">${opt}</button>`;
            });
        } else if (activeLevel === 2) {
            headerImg.src = "isi link (gambar teks pertanyaan MANAKAH HURUF YANG BERBUNYI...) disini";
            centerImg.src = ""; 
            letterData.forEach(item => {
                ansBox.innerHTML += `<img class="btn-interactive" src="${item.imgAsli}" width="100" onclick="checkQuizAnswer('${item.name}', '${currentItem.name}')">`;
            });
        }
    }

    function checkQuizAnswer(chosen, correct) {
        if (chosen === correct) {
            globalScore += 20;
            document.getElementById('quiz-score-display').innerText = `SKOR : ${globalScore}`;
            alert("Sempurna!");
        } else { alert("Coba lagi, Ninja!"); }

        quizCurrentQuestion++;
        if (quizCurrentQuestion >= 2) { 
            alert(`Level Selesai! Skor: ${globalScore}`);
            if (activeLevel === 1) {
                level2Unlocked = true;
                const lvl2Img = document.getElementById('lvl-btn-2');
                lvl2Img.style.filter = "none";
                lvl2Img.style.pointerEvents = "auto";
            }
            goToScreen('screen-bermain-level');
        } else { generateQuizQuestion(); }
    }

    const canvas = document.getElementById('writing-canvas');
    const ctx = canvas.getContext('2d');
    let drawing = false;

    ctx.strokeStyle = '#ff7f27'; 
    ctx.lineWidth = 14;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';

    canvas.addEventListener('mousedown', () => drawing = true);
    canvas.addEventListener('mouseup', () => { drawing = false; ctx.beginPath(); });
    canvas.addEventListener('mousemove', drawMandiri);
    canvas.addEventListener('touchstart', (e) => { drawing = true; e.preventDefault(); });
    canvas.addEventListener('touchend', () => { drawing = false; ctx.beginPath(); });
    canvas.addEventListener('touchmove', (e) => {
        if(!drawing) return;
        const rect = canvas.getBoundingClientRect();
        const touch = e.touches[0];
        ctx.lineTo(touch.clientX - rect.left, touch.clientY - rect.top);
        ctx.stroke(); ctx.beginPath(); ctx.moveTo(touch.clientX - rect.left, touch.clientY - rect.top);
    });

    function drawMandiri(e) {
        if (!drawing) return;
        const rect = canvas.getBoundingClientRect();
        ctx.lineTo(e.clientX - rect.left, e.clientY - rect.top);
        ctx.stroke(); ctx.beginPath(); ctx.moveTo(e.clientX - rect.left, e.clientY - rect.top);
    }

    function clearCanvas() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        document.getElementById('reward-overlay').style.display = 'none';
    }

    function checkWritingSuccess() {
        document.getElementById('reward-overlay').style.display = 'block';
        globalScore += 50;
        document.getElementById('latihan-score-display').innerText = `SKOR : ${globalScore}`;
        const currentItem = letterData[currentLetterIndex];
        document.getElementById('canvas-bg-box').style.backgroundImage = `url('${currentItem.fullColor}')`;
    }
</script>

</body>
