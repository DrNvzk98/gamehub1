<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ninja Arcade - Arabic Education Game</title>
    <style>
        /* ==========================================================================
           [NOTE 1] PENGATURAN FONT GLOBAL & UTAN ASPEK RATIO (16:9)
           ========================================================================== */
        @font-face {
            font-family: 'Skrapbook';
            src: url('asset/fonts/skrapbook.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            margin: 0;
            padding: 0;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #1a1a1a;
            font-family: 'Lazydog', sans-serif;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #game-shell {
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        #game-viewport {
            position: relative;
            width: 1600px;
            height: 900px;
            max-width: 100vw;
            max-height: 100vh;
            transform-origin: center center;
            transform: scale(var(--viewport-scale, 1));
            background-color: #7ec0ee;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        #game-viewport img {
            display: block;
            max-width: 100%;
            height: auto;
        }

        /* ==========================================================================
           [NOTE 2] PARALLAX EFFECT (Awan & Gunung Berjalan Lambat)
           ========================================================================== */
        .parallax-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            pointer-events: none;
        }

        /* Gunung berjalan sangat lambat (120 detik) untuk efek melayang hebat */
        .mountain-parallax {
            background-repeat: repeat-x;
            animation: moveBg 120s linear infinite;
        }

        /* Gerakan awan dengan delay dan durasi berbeda */
        .cloud-1 { animation: moveBg 30s linear infinite; }
        .cloud-2 { animation: moveBg 45s linear infinite; animation-delay: -5s; }

        @keyframes moveBg {
            0% { background-position-x: 0px; }
            100% { background-position-x: -1920px; } /* Sesuaikan dengan batas loop horizontal */
        }

        /* ==========================================================================
           [NOTE 3] ANIMASI INTERAKTIF (Ninja Floating & Zoom-In)
           ========================================================================== */
        .ninja-floating {
            animation: ninjaFloat 3s ease-in-out infinite;
        }
        @keyframes ninjaFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        /* Efek Zoom-In Cepat untuk Gambar Judul Utama */
        .zoom-in-title {
            animation: titleZoom 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes titleZoom {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .btn-interactive {
            cursor: pointer;
            transition: transform 0.2s ease;
        }
        .btn-interactive:hover {
            transform: scale(1.08); /* Efek membesar sedikit saat ditunjuk */
        }
        .btn-interactive:active {
            transform: scale(0.95);
        }

        /* Gaya teks dinamis untuk skor */
        .lazydog-text {
          /* Mengubah target font utama menjadi Skrapbook */
          font-family: 'Skrapbook', 'Lazydog', sans-serif; 
          color: #bd6a2c; 
          -webkit-text-stroke: 2px white; 
             text-shadow: 2px 2px 0px rgba(0,0,0,0.1);
             text-align: center;
        }

        .game-screen {
            display: none;
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
        }
        .game-screen.active {
            display: block;
        }

        /* Sistem Navigasi Dropdown Menu Samping */
        #global-nav {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 100;
        }
        .dropdown-menu {
            display: none;
            position: absolute;
            top: 70px;
            right: 0;
            background: rgba(139, 69, 19, 0.95);
            border: 4px solid #fff;
            border-radius: 15px;
            padding: 15px;
            min-width: 180px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .dropdown-menu-box {
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
        }

        #info-popup {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 200;
        }

        /* Nampan Tempat Bank Huruf Bawah */
        .letter-bank-container {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 85%;
            height: 100px;
            background: linear-gradient(135deg, #8d4a1a, #c97a2d);
            border: 3px solid #fff;
            border-radius: 18px;
            overflow-x: auto;
            white-space: nowrap;
            padding: 15px 30px;
        }
        .bank-item {
            display: inline-block;
            width: 60px;
            height: 60px;
            margin-right: 15px;
        }

        #writing-canvas {
            background: transparent;
            cursor: crosshair;
        }
    </style>
</head>
<body>

<div id="game-shell">
<div id="game-viewport">

    
    <div class="parallax-layer cloud-1" style="background-image: url('asset/images/awan1.png'); opacity: 1;"></div>
    <div class="parallax-layer cloud-2" style="background-image: url('asset/images/awan2.png'); opacity: 1;"></div>
    <div class="parallax-layer mountain-parallax" style="background-image: url('asset/images/gunung.png');"></div>

    <audio id="bgm" loop></audio>

    <div id="global-nav" style="display: none;">
        <img id="btn-burger" class="btn-interactive" src="asset/tombol/ttitik3.png" width="60" height="60" onclick="toggleDropdown()">
        <img id="btn-close-menu" class="btn-interactive" src="asset/tombol/tclose.png" width="60" height="60" style="display:none; position: absolute; top:0; left:0;" onclick="closeAllMenus()">
        
        <div id="dropdown-box" class="dropdown-menu">
            <div class="dropdown-menu-box">
                <img class="btn-interactive" src="asset/tombol/thome.png" width="130" height="45" onclick="goToScreen('screen-start')">
                <img id="btn-toggle-music" class="btn-interactive" src="asset/tombol/tmusic-on.png" width="130" height="45" onclick="toggleMusic()">
                <img class="btn-interactive" src="asset/tombol/tinfo.png" width="130" height="45" onclick="showInfoPopup()">
            </div>
        </div>
    </div>

    <div id="info-popup">
        <div style="position: absolute; top:50%; left:50%; transform: translate(-50%, -50%); width:600px; height:400px; background: url('asset/tombol/pad.png') no-repeat center; background-size:100% 100%;">
            <div class="lazydog-text" style="font-size: 26px; color: #fff; margin-top: 110px; padding: 0 50px;">
                NINJA ARCADE INFO<br><br>
                Game edukasi interaktif untuk mengenal bentuk asli, bunyi harakat, serta latihan menulis huruf Hijaiyyah!
            </div>
        </div>
    </div>


    <div id="screen-start" class="game-screen active" style="background: url('asset/images/langit.png') no-repeat center; background-size: cover;">
         <img class="ninja-floating" src="asset/images/karakter.png" width="200" height="auto" style="position: absolute; top: 40%; right: 1%;">
    </div>

        <div class="zoom-in-title" style="position: absolute; top: 2%; left: 20%; width: 60%; text-align: center;">
            <img src="asset/images/judul game.png" style="max-width: 90%; height: auto;">
        </div>
        
        <img class="btn-interactive" src="asset/tombol/Start.png" width="120" height="
    " style="position: absolute; top: 45%; left: 20%;" onclick="startPlay()">
        
       


    <div id="screen-mode-selection" class="game-screen" style="background: url('asset/images/awan4.png') no-repeat center; background-size: cover;">
        <div style="position: absolute; top: 5%; left: 5%; width: 18%;">
            <img src="asset/images/judul game.png" style="width: 100%;">
        </div>
        
        <div style="position: absolute; top: 15%; left: 45%; display: flex; flex-direction: column; gap: 5px;">
            <img class="btn-interactive" src="asset/tombol/tbelajar.png" width="200" height="auto" onclick="goToScreen('screen-belajar-mengenal')">
            <img class="btn-interactive" src="asset/tombol/tbermain.png" width="200" height="auto" onclick="goToScreen('screen-bermain-level')">
            <img class="btn-interactive" src="asset/tombol/tlatihan.png" width="200" height="auto" onclick="goToScreen('screen-latihan-list')">
        </div>

        <img class="ninja-floating" src="asset/images/karakter.png" width="250" height="250" style="position: absolute; bottom: 10%; left: 15%;">
    </div>


    <div id="screen-belajar-mengenal" class="game-screen" style="background: url('asset/images/bukit2.png') no-repeat center; background-size: cover;">
        <div style="position: absolute; top: 18%; left: 38%; width: 55%;">
            <img src="asset/images/informasi.png" style="width: 100%;">
        </div>
        <img class="btn-interactive" src="asset/tombol/startkayu.png" width="200" height="100" style="position: absolute; bottom: 20%; left: 55%;" onclick="goToScreen('screen-belajar-kategori')">
        <img class="ninja-floating" src="asset/images/karakter2.png" width="250" height="250" style="position: absolute; bottom: 10%; left: 10%;">
    </div>

    <div id="screen-belajar-kategori" class="game-screen" style="background: url('asset/images/awan3.png') no-repeat center; background-size: cover;">
        <div style="position: absolute; top: 15%; left: 45%; display: flex; flex-direction: column; gap: 15px;">
            <img class="btn-interactive" src="asset/tombol/hurufasli.png" width="320" height="85" onclick="initMenuBelajar('asli')">
            <img class="btn-interactive" src="asset/tombol/hurufberharakat.png" width="320" height="85" onclick="initMenuBelajar('harakat')">
            <img class="btn-interactive" src="asset/tombol/menulis.png" width="320" height="85" onclick="initMenuBelajar('menulis')">
        </div>
        <img class="ninja-floating" src="asset/images/karakter2.png" width="250" height="250" style="position: absolute; bottom: 10%; left: 10%;">
    </div>


    <div id="screen-belajar-core" class="game-screen" style="background: url('asset/images/langit.png') no-repeat center; background-size: cover;">
        <div id="belajar-title-instruction-box" style="position: absolute; top: 6%; left: 32%; width: 45%; text-align: center;">
            <img id="img-instruction-header" src="asset/images/informasi.png" style="max-width: 100%; height: auto;">
        </div>

        <div id="belajar-content-area" style="position: absolute; top: 25%; left: 40%; width: 40%; height: 40%; display: flex; justify-content: center; align-items: center; gap: 30px;"></div>

        <img class="btn-interactive" src="asset/tombol/prev.png" width="70" height="70" style="position: absolute; top: 45%; left: 33%;" onclick="navigateLetter(-1)">
        <img class="btn-interactive" src="asset/tombol/next.png" width="70" height="70" style="position: absolute; top: 45%; right: 23%;" onclick="navigateLetter(1)">

        <div class="letter-bank-container" id="bank-huruf-list"></div>

        <img class="ninja-floating" src="asset/images/karakter2.png" width="250" height="250" style="position: absolute; bottom: 15%; left: 8%;">
    </div>


    <div id="screen-bermain-level" class="game-screen" style="background: url('asset/images/awan4.png') no-repeat center; background-size: cover;">
        <div style="position: absolute; top: 6%; left: 30%; width: 40%; text-align: center;">
            <img src="asset/images/judul game.png" style="max-width: 100%;">
        </div>
        
        <div style="position: absolute; top: 42%; left: 50%; transform: translateX(-50%); display: flex; gap: 40px;">
            <div style="text-align: center;">
                <img id="lvl-btn-1" class="btn-interactive" src="asset/tombol/levelfin.png" width="90" height="90" onclick="startQuizLevel(1)">
                <div class="lazydog-text" style="color:#fff; font-size:18px; margin-top:5px;">LEVEL 1</div>
            </div>
            <div style="text-align: center;">
                <img id="lvl-btn-2" class="btn-interactive" src="asset/tombol/levelun.png" width="90" height="90" onclick="startQuizLevel(2)" style="filter: grayscale(0.3); pointer-events: none;">
                <div class="lazydog-text" style="color:#fff; font-size:18px; margin-top:5px;">LEVEL 2</div>
            </div>
        </div>
    </div>

    <div id="screen-quiz-gameplay" class="game-screen" style="background: url('asset/images/gunung.png') no-repeat center; background-size: cover;">
        <div class="lazydog-text" id="quiz-score-display" style="position: absolute; top: 25px; left: 45px; font-size: 32px; color: #fff;">SKOR : 0</div>
        
        <div style="position: absolute; top: 12%; left: 30%; width: 40%; text-align: center;">
            <img id="img-quiz-question-title" src="asset/images/informasi.png" style="max-width: 100%;">
        </div>

        <div style="position: absolute; top: 30%; left: 45%; width: 15%; height: 30%; display:flex; justify-content:center; align-items:center;">
            <img id="quiz-center-image" src="" style="max-width:100%; max-height:100%;">
        </div>

        <div id="quiz-answers-box" style="position: absolute; bottom: 15%; left: 50%; transform: translateX(-50%); display: flex; gap: 30px;"></div>
    </div>


    <div id="screen-latihan-list" class="game-screen" style="background: url('asset/images/gunungtenggelam.png') no-repeat center; background-size: cover;">
        <div class="lazydog-text" id="latihan-score-display" style="position: absolute; top: 25px; left: 45px; font-size: 32px; color: #fff;">SKOR : 0</div>
        
        <div style="position: absolute; top: 8%; left: 30%; width: 40%; text-align: center;">
            <img src="asset/images/informasi.png" style="max-width: 100%;">
        </div>

        <div id="canvas-bg-box" style="position: absolute; top: 22%; left: 40%; width: 300px; height: 300px; background: url('asset/hurufasli/alif.png') no-repeat center; background-size: contain; border: 4px dashed white; border-radius: 20px;">
            <canvas id="writing-canvas" width="300" height="300"></canvas>
        </div>

        <div id="reward-overlay" style="display:none; position: absolute; top:25%; left:42%; width:260px; background: rgba(255,255,255,0.9); border-radius:20px; padding:20px; text-align:center; box-shadow: 0 5px 15px rgba(0,0,0,0.3);">
            <img src="asset/images/karakter.png" width="100">
            <div class="lazydog-text" style="font-size:24px; color: green; margin-top:20px;">SEMPURNA!</div>
        </div>

        <div style="position: absolute; bottom: 15%; left: 42%; display:flex; gap:20px;">
            <img class="btn-interactive" src="asset/tombol/prev.png" width="120" height="50" onclick="clearCanvas()">
            <img class="btn-interactive" src="asset/tombol/next.png" width="140" height="50" onclick="checkWritingSuccess()">
        </div>

        <img class="ninja-floating" src="asset/images/karakter2.png" width="220" height="220" style="position: absolute; bottom: 10%; left: 8%;">
    </div>

</div>
</div>

<script>
    // MASUKKAN LINK DETAIL MASING-MASING FILE GAMBER DAN SUARA KAMU DI ARRAY DI BAWAH INI
    const letterData = [
        { 
            id: 0, 
            name: 'ALIF', 
            imgAsli: 'asset/hurufasli/alif.png', 
            imgA: 'asset/hurufasli/alif.png', 
            imgI: 'asset/hurufasli/alif.png', 
            imgU: 'asset/hurufasli/alif.png', 
            audio: '', 
            audioA: '', 
            audioI: '', 
            audioU: '', 
            outline: 'asset/hurufasli/alif.png', 
            fullColor: 'asset/hurufasli/alif.png' 
        },
        { 
            id: 1, 
            name: 'BA', 
            imgAsli: 'asset/hurufasli/ba.png', 
            imgA: 'asset/hurufasli/ba.png', 
            imgI: 'asset/hurufasli/ba.png', 
            imgU: 'asset/hurufasli/ba.png', 
            audio: '', 
            audioA: '', 
            audioI: '', 
            audioU: '', 
            outline: 'asset/hurufasli/ba.png', 
            fullColor: 'asset/hurufasli/ba.png' 
        }
    ];

    let currentLetterIndex = 0;
    let currentBelajarMode = 'asli'; 
    let globalScore = 0;
    let musicPlaying = false;
    let level2Unlocked = false;
    let quizCurrentQuestion = 0;

    function fitGameViewport() {
        const viewport = document.getElementById('game-viewport');
        if (!viewport) return;

        const baseWidth = 1600;
        const baseHeight = 900;
        const scale = Math.min(window.innerWidth / baseWidth, window.innerHeight / baseHeight);
        document.documentElement.style.setProperty('--viewport-scale', scale.toFixed(4));
    }

    window.addEventListener('resize', fitGameViewport);
    window.addEventListener('load', fitGameViewport);

    // [NOTE 5] LINK KUSTOMISASI TOMBOL TOGGLE MUSIC IMAGE
    // Tempelkan link gambar terpisah untuk kondisi ON dan kondisi OFF di variabel ini!
    const imgMusicOnLink = "asset/tombol/tsoundon.png";
    const imgMusicOffLink = "asset/tombol/tsoundoff.png";

    function goToScreen(screenId) {
        document.querySelectorAll('.game-screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
        if (screenId === 'screen-start') {
            document.getElementById('global-nav').style.display = 'none';
        } else {
            document.getElementById('global-nav').style.display = 'block';
        }
        closeAllMenus();
    }

    function startPlay() {
        if(!musicPlaying) { toggleMusic(); }
        goToScreen('screen-mode-selection');
    }

    function toggleDropdown() {
        const dd = document.getElementById('dropdown-box');
        const burger = document.getElementById('btn-burger');
        const closeBtn = document.getElementById('btn-close-menu');
        if (dd.style.display === 'block') {
            closeAllMenus();
        } else {
            dd.style.display = 'block';
            burger.style.display = 'none';
            closeBtn.style.display = 'block';
        }
    }

    function closeAllMenus() {
        document.getElementById('dropdown-box').style.display = 'none';
        document.getElementById('info-popup').style.display = 'none';
        document.getElementById('btn-close-menu').style.display = 'none';
        document.getElementById('btn-burger').style.display = 'block';
    }

    function showInfoPopup() { document.getElementById('info-popup').style.display = 'block'; }

    function toggleMusic() {
        const audio = document.getElementById('bgm');
        const btnImg = document.getElementById('btn-toggle-music');
        if (musicPlaying) {
            audio.pause();
            btnImg.src = imgMusicOffLink;
            musicPlaying = false;
        } else {
            audio.play().catch(e => console.log("Audio play blocked"));
            btnImg.src = imgMusicOnLink;
            musicPlaying = true;
        }
    }

    function initMenuBelajar(mode) {
        currentBelajarMode = mode;
        currentLetterIndex = 0;
        goToScreen('screen-belajar-core');
        renderLetterContent();
        renderLetterBank();
    }

   function renderLetterContent() {
    const area = document.getElementById('belajar-content-area');
    const headerImg = document.getElementById('img-instruction-header');
    const item = letterData[currentLetterIndex];
    area.innerHTML = '';

    // 1. Sembunyikan elemen gambar header bawaan karena akan diganti teks HTML langsung di area
    if (headerImg) headerImg.style.display = 'none';

    if (currentBelajarMode === 'asli') {
        area.innerHTML = `
            <div style="text-align:center; width: 100%;">
                <div class="lazydog-text" style="font-size: 26px; color: #bd6a2c; -webkit-text-stroke: 1.5px white; margin-bottom: 25px; text-shadow: 2px 2px 0px rgba(0,0,0,0.15);">
                    KLIK HURUF UNTUK MENDENGARKAN SUARA
                </div>
                
                <div style="display: inline-block;">
                    <img class="btn-interactive" src="${item.imgAsli}" width="150" onclick="playAudio('${item.audio}')"><br>
                    <div class="lazydog-text" style="font-size:32px; color:#fff; margin-top:10px;">${item.name}</div>
                </div>
            </div>
        `;
    } else if (currentBelajarMode === 'harakat') {
        area.innerHTML = `
            <div style="text-align:center; width: 100%;">
                <div class="lazydog-text" style="font-size: 26px; color: #bd6a2c; -webkit-text-stroke: 1.5px white; margin-bottom: 25px; text-shadow: 2px 2px 0px rgba(0,0,0,0.15);">
                    KLIK HURUF UNTUK SUARA HARAKAT
                </div>
                
                <div style="display: flex; justify-content: center; gap: 30px; align-items: center;">
                    <div class="btn-interactive" style="text-align:center;" onclick="playAudio('${item.audioU}')">
                        <img src="${item.imgU}" width="90"><div class="lazydog-text" style="font-size:24px; color:#fff;">U</div>
                    </div>
                    <div class="btn-interactive" style="text-align:center;" onclick="playAudio('${item.audioI}')">
                        <img src="${item.imgI}" width="90"><div class="lazydog-text" style="font-size:24px; color:#fff;">I</div>
                    </div>
                    <div class="btn-interactive" style="text-align:center;" onclick="playAudio('${item.audioA}')">
                        <img src="${item.imgA}" width="90"><div class="lazydog-text" style="font-size:24px; color:#fff;">A</div>
                    </div>
                </div>
            </div>
        `;
    } else if (currentBelajarMode === 'menulis') {
        area.innerHTML = `
            <div style="text-align:center; width: 100%;">
                <div class="lazydog-text" style="font-size: 26px; color: #bd6a2c; -webkit-text-stroke: 1.5px white; margin-bottom: 25px; text-shadow: 2px 2px 0px rgba(0,0,0,0.15);">
                    TEKAN HURUF UNTUK MELIHAT CARA PENULISAN
                </div>
                
                <div style="display: inline-block;">
                    <img id="animated-writing-img" class="btn-interactive" src="${item.outline}" width="160" onclick="triggerWritingAnimation()">
                    <div class="lazydog-text" style="font-size:28px; color:#fff; margin-top:10px;">${item.name}</div>
                </div>
            </div>
        `;
    }
}

    function triggerWritingAnimation() {
        const img = document.getElementById('animated-writing-img');
        const item = letterData[currentLetterIndex];
        img.src = item.fullColor;
        setTimeout(() => { img.src = item.outline; }, 2500);
    }

    function renderLetterBank() {
        const bank = document.getElementById('bank-huruf-list');
        bank.innerHTML = '';
        letterData.forEach((item, index) => {
            const node = document.createElement('img');
            node.className = 'bank-item btn-interactive';
            node.src = item.imgAsli;
            node.onclick = () => { currentLetterIndex = index; renderLetterContent(); };
            bank.appendChild(node);
        });
    }

    function navigateLetter(dir) {
        currentLetterIndex += dir;
        if (currentLetterIndex < 0) currentLetterIndex = letterData.length - 1;
        if (currentLetterIndex >= letterData.length) currentLetterIndex = 0;
        renderLetterContent();
    }

    function playAudio(src) { const sound = new Audio(src); sound.play().catch(e => {}); }

    let activeLevel = 1;
    function startQuizLevel(lvl) {
        activeLevel = lvl;
        quizCurrentQuestion = 0;
        goToScreen('screen-quiz-gameplay');
        generateQuizQuestion();
    }

    function generateQuizQuestion() {
        const centerImg = document.getElementById('quiz-center-image');
        const headerImg = document.getElementById('img-quiz-question-title');
        const ansBox = document.getElementById('quiz-answers-box');
        ansBox.innerHTML = '';
        const currentItem = letterData[quizCurrentQuestion % letterData.length];

        if (activeLevel === 1) {
            headerImg.src = "asset/images/informasi.png";
            centerImg.src = currentItem.imgAsli;
            const options = [currentItem.name, 'TSA']; 
            options.sort(() => Math.random() - 0.5);
            options.forEach(opt => {
                ansBox.innerHTML += `<button class="btn-interactive lazydog-text" style="padding:15px 30px; font-size:24px; background:rgba(139,69,19,0.9); border:4px solid white; border-radius:10px; color:#fff;" onclick="checkQuizAnswer('${opt}', '${currentItem.name}')">${opt}</button>`;
            });
        } else if (activeLevel === 2) {
            headerImg.src = "asset/images/informasi.png";
            centerImg.src = ""; 
            letterData.forEach(item => {
                ansBox.innerHTML += `<img class="btn-interactive" src="${item.imgAsli}" width="100" onclick="checkQuizAnswer('${item.name}', '${currentItem.name}')">`;
            });
        }
    }

    function checkQuizAnswer(chosen, correct) {
        if (chosen === correct) {
            globalScore += 20;
            document.getElementById('quiz-score-display').innerText = `SKOR : ${globalScore}`;
            alert("Sempurna!");
        } else { alert("Coba lagi, Ninja!"); }

        quizCurrentQuestion++;
        if (quizCurrentQuestion >= 2) { 
            alert(`Level Selesai! Skor: ${globalScore}`);
            if (activeLevel === 1) {
                level2Unlocked = true;
                const lvl2Img = document.getElementById('lvl-btn-2');
                lvl2Img.style.filter = "none";
                lvl2Img.style.pointerEvents = "auto";
                lvl2Img.src = "asset/tombol/levelfin.png";
            }
            goToScreen('screen-bermain-level');
        } else { generateQuizQuestion(); }
    }

    const canvas = document.getElementById('writing-canvas');
    const ctx = canvas.getContext('2d');
    let drawing = false;

    ctx.strokeStyle = '#ff7f27'; 
    ctx.lineWidth = 14;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';

    canvas.addEventListener('mousedown', () => drawing = true);
    canvas.addEventListener('mouseup', () => { drawing = false; ctx.beginPath(); });
    canvas.addEventListener('mousemove', drawMandiri);
    canvas.addEventListener('touchstart', (e) => { drawing = true; e.preventDefault(); });
    canvas.addEventListener('touchend', () => { drawing = false; ctx.beginPath(); });
    canvas.addEventListener('touchmove', (e) => {
        if(!drawing) return;
        const rect = canvas.getBoundingClientRect();
        const touch = e.touches[0];
        ctx.lineTo(touch.clientX - rect.left, touch.clientY - rect.top);
        ctx.stroke(); ctx.beginPath(); ctx.moveTo(touch.clientX - rect.left, touch.clientY - rect.top);
    });

    function drawMandiri(e) {
        if (!drawing) return;
        const rect = canvas.getBoundingClientRect();
        ctx.lineTo(e.clientX - rect.left, e.clientY - rect.top);
        ctx.stroke(); ctx.beginPath(); ctx.moveTo(e.clientX - rect.left, e.clientY - rect.top);
    }

    function clearCanvas() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        document.getElementById('reward-overlay').style.display = 'none';
    }

    function checkWritingSuccess() {
        document.getElementById('reward-overlay').style.display = 'block';
        globalScore += 50;
        document.getElementById('latihan-score-display').innerText = `SKOR : ${globalScore}`;
        const currentItem = letterData[currentLetterIndex];
        document.getElementById('canvas-bg-box').style.backgroundImage = `url('${currentItem.fullColor}')`;
    }
</script>

</body>
</html>
